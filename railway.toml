# Railway deployment config — el backend vive en backend/, no en la raíz.
# Sin este archivo, Nixpacks no sabe entrar al subdirectorio y arranca lo que adivina.

[build]
builder = "nixpacks"

[deploy]
# - --proxy-headers + --forwarded-allow-ips='*' hacen que FastAPI vea correctamente
#   X-Forwarded-Proto=https que el load balancer de Railway añade.
# - --ws-ping-interval/--ws-ping-timeout mantienen la conexión WS viva (Railway
#   corta conexiones idle ~60-90s sin keepalive).
# - --timeout-keep-alive 65 cubre el tiempo de keepalive de Railway (60s).
# Si cambias estos flags, vuelve a verificar wss:// desde el FE.
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=* --ws-ping-interval 20 --ws-ping-timeout 30 --timeout-keep-alive 65"

# /healthz responde 200 SIEMPRE (sin tocar app.state) — el cold start tarda
# minutos descargando el modelo HuggingFace y /health real podría tardar.
healthcheckPath = "/healthz"
healthcheckTimeout = 300

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
